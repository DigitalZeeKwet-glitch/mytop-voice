<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar AI Audio Studio - VIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding: 20px; }
        .card { max-width: 500px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .vip-box { background-color: #0d2354; color: white; border-radius: 10px; padding: 20px; text-center }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- ၁။ LOGIN BOX (PASSWORD နှင့် TELEGRAM LINK ပြသည့်နေရာ) -->
    <div id="loginSection" class="card p-4 mt-4">
        <div class="vip-box text-center mb-4">
            <h5>VIP Password (သို့) အကောင့်အသစ် ဝယ်ယူလိုပါက</h5>
            <a href="https://t.me/Mrkhant98" class="text-warning fw-bold d-block my-2" target="_blank">@Mrkhant98</a>
            <small class="text-white-50">သို့ Telegram မှ တိုက်ရိုက် ဆက်သွယ်နိုင်ပါသည်။</small>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">🔑 Password ရိုက်ထည့်ပါ</label>
            <input type="password" id="passwordInput" class="form-control" placeholder="Password ဖြည့်ပါ...">
        </div>
        <button onclick="checkVIPPassword()" class="btn btn-warning w-100 fw-bold text-white py-2">🚀 လော့ဂ်အင် ဝင်မည် (Login)</button>
        <p id="loginError" class="text-danger mt-2 text-center hidden"></p>
    </div>

    <!-- ၂။ MAIN STUDIO BOX (အသံပြောင်းသည့်နေရာ) -->
    <div id="studioSection" class="card p-4 mt-4 hidden">
        <h3 class="text-center text-success mb-3">🎙 Myanmar Audio Studio 2</h3>
        <div class="alert alert-info text-center py-1" id="vipStatus"></div>
        
        <div class="mb-3">
            <label class="form-label">🎙 ဇာတ်ကောင် / အသံ ရွေးချယ်ရန်</label>
            <select id="voiceSelect" class="form-select">
                <option value="my">သီဟ (🇲🇲 - အမျိုးသား ပုံမှန်)</option>
                <option value="my_female">မြတ်နိုး (🇲🇲 - အမျိုးသမီး ပုံမှန်)</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">စာတန်းထိုး အမျိုးအစား</label>
            <div>
                <input type="radio" name="platform" id="tiktok" checked> TikTok &nbsp;&nbsp;
                <input type="radio" name="platform" id="youtube"> YouTube
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">စာသား</label>
            <textarea id="textInput" class="form-control" rows="4" placeholder="ကျား: မင်္ဂလာပါ။"></textarea>
        </div>

        <button onclick="generateAudio()" class="btn btn-orange w-100 fw-bold btn-danger py-2">🚀 အသံဖိုင် ဖန်တီးမည် (Generate)</button>
        
        <div class="mt-4 text-center">
            <audio id="audioPlayer" controls class="w-100 hidden"></audio>
        </div>
    </div>

    <!-- ၃။ VIP PASSWORD & DATE CONTROL JAVASCRIPT -->
    <script>
        // ဝယ်ယူထားသော User များ၏ Password နှင့် သက်တမ်းကုန်ဆုံးမည့်ရက် (နှစ်-လ-ရက်)
        const vipUsers = {
            "000123": "2026-12-15"
        };

        function checkVIPPassword() {
            const userInput = document.getElementById("passwordInput").value.trim();
            const errorText = document.getElementById("loginError");
            
            // Password ရှိမရှိ စစ်ဆေးခြင်း
            if (vipUsers.hasOwnProperty(userInput)) {
                const expiryDateStr = vipUsers[userInput];
                const expiryDate = new Date(expiryDateStr);
                const today = new Date();

                // အချိန်ဇုန်များကြောင့် နေ့ရက်ကိုပဲ နှိုင်းယှဉ်ရန် Time တန်ဖိုးများကို သုညလုပ်ခြင်း
                today.setHours(0,0,0,0);
                expiryDate.setHours(0,0,0,0);

                // ရက်စွဲ သက်တမ်းကုန်မကုန် စစ်ဆေးခြင်း
                if (today <= expiryDate) {
                    // အောင်မြင်ပါက Studio အကွက်ကို ပြပါ
                    document.getElementById("loginSection").classList.add("hidden");
                    document.getElementById("studioSection").classList.remove("hidden");
                    document.getElementById("vipStatus").innerText = `👑 VIP အကောင့် - သက်တမ်းကုန်မည့်ရက်: ${expiryDateStr}`;
                } else {
                    // သက်တမ်းကုန်သွားပါက
                    errorText.innerText = `❌ ဒီ Password က ${expiryDateStr} နေ့မှာ သက်တမ်းကုန်သွားပါပြီ။`;
                    errorText.classList.remove("hidden");
                }
            } else {
                // Password မှားပါက
                errorText.innerText = "❌ Password မှားနေပါသည်။ အသစ်ဝယ်ယူရန် Telegram ကို ဆက်သွယ်ပါ။";
                errorText.classList.remove("hidden");
            }
        }

        function generateAudio() {
            const text = document.getElementById("textInput").value;
            if(!text) { alert("စာသားရိုက်ပါ!"); return; }
            const googleTtsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=my&client=tw-ob&q=${encodeURIComponent(text)}`;
            const player = document.getElementById("audioPlayer");
            player.src = googleTtsUrl;
            player.classList.remove("hidden");
            player.play();
        }
    </script>
</body>
</html>
