<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar AI Audio Studio - VIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding: 20px; }
        .card { max-width: 500px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 12px; }
        .vip-box { background-color: #0d2354; color: white; border-radius: 10px; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- ၁။ LOGIN BOX -->
    <div id="loginSection" class="card p-4 mt-4">
        <div class="vip-box text-center mb-4">
            <h5>VIP Password (သို့) အကောင့်အသစ် ဝယ်ယူလိုပါက</h5>
            <a href="https://t.me/Mrkhant98" class="text-warning fw-bold d-block my-2" target="_blank">@Mrkhant98</a>
            <small class="text-white-50">သို့ Telegram မှ တိုက်ရိုက် ဆက်သွယ်နိုင်ပါသည်။</small>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">🔑 Password ရိုက်ထည့်ပါ</label>
            <input type="password" id="passwordInput" class="form-control" placeholder="Password ဖြည့်ပါ...">
        </div>
        <button onclick="checkVIPPassword()" class="btn btn-warning w-100 fw-bold text-white py-2">🚀 လော့ဂ်အင် ဝင်မည် (Login)</button>
        <p id="loginError" class="text-danger mt-2 text-center hidden"></p>
    </div>

    <!-- ၂။ MAIN STUDIO BOX -->
    <div id="studioSection" class="card p-4 mt-4 hidden">
        <h3 class="text-center text-success fw-bold mb-3">🎙 Myanmar Audio Studio 2</h3>
        <div class="alert alert-info text-center py-1 small" id="vipStatus"></div>

        <div class="mb-3">
            <label class="form-label small fw-bold">🗣 ဇာတ်ကောင် / အသံ ရွေးချယ်ရန်</label>
            <select id="voiceSelect" class="form-select form-select-sm">
                <option value="my-MM">မြန်မာအသံ (🇲🇲 - Premium Engine)</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">စာတန်းထိုး အမျိုးအစား</label>
            <div>
                <input type="radio" name="platform" id="tiktok" checked> TikTok &nbsp;&nbsp;
                <input type="radio" name="platform" id="youtube"> YouTube
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">စာသား</label>
            <textarea id="textInput" class="form-control" rows="4" placeholder="ဤနေရာတွင် မြန်မာလို စာသားရိုက်ပါ..."></textarea>
        </div>

        <button onclick="generateAudio()" id="genBtn" class="btn btn-danger w-100 fw-bold py-2">🚀 အသံဖိုင် ဖန်တီးမည် (Generate)</button>
        
        <!-- အသံစမ်းသပ်ရန်နှင့် လမ်းညွှန်ချက် ပြသမည့်နေရာ -->
        <div id="resultSection" class="mt-4 text-center hidden">
            <div class="alert alert-success fw-bold py-2">🎉 အသံဖတ်ခြင်း အောင်မြင်ပါသည်။</div>
            <p class="text-muted small">သင့်ဖုန်း/စနစ်၏ မူရင်းအသံဖြင့် တိုက်ရိုက်အသံထွက် ဖွင့်ပြပေးနေပါသည်။</p>
        </div>
    </div>

    <script>
        // Password Control 
        const vipUsers = {
            "000123": "2026-12-15"
        };

        function checkVIPPassword() {
            const userInput = document.getElementById("passwordInput").value.trim();
            const errorText = document.getElementById("loginError");
            
            if (vipUsers.hasOwnProperty(userInput)) {
                const expiryDateStr = vipUsers[userInput];
                const expiryDate = new Date(expiryDateStr);
                const today = new Date();
                today.setHours(0,0,0,0);
                expiryDate.setHours(0,0,0,0);

                if (today <= expiryDate) {
                    document.getElementById("loginSection").classList.add("hidden");
                    document.getElementById("studioSection").classList.remove("hidden");
                    document.getElementById("vipStatus").innerText = `👑 VIP အကောင့် - သက်တမ်းကုန်မည့်ရက်: ${expiryDateStr}`;
                } else {
                    errorText.innerText = `❌ ဒီ Password က ${expiryDateStr} နေ့မှာ သက်တမ်းကုန်သွားပါပြီ။`;
                    errorText.classList.remove("hidden");
                }
            } else {
                errorText.innerText = "❌ Password မှားနေပါသည်။ အသစ်ဝယ်ယူရန် Telegram ကို ဆက်သွယ်ပါ။";
                errorText.classList.remove("hidden");
            }
        }

        // Browser Native Speech Synthesis စနစ်သစ်
        function generateAudio() {
            const text = document.getElementById("textInput").value.trim();
            const genBtn = document.getElementById("genBtn");
            const resultSection = document.getElementById("resultSection");

            if(!text) { alert("ကျေးဇူးပြု၍ စာသားရိုက်ထည့်ပါ!"); return; }

            if ('speechSynthesis' in window) {
                // လက်ရှိအသံထွက်နေတာရှိရင် ရပ်ပစ်မည်
                window.speechSynthesis.cancel();

                genBtn.innerText = "⏳ အသံဖတ်နေသည်...";
                genBtn.disabled = true;

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'my-MM'; // မြန်မာဘာသာစကား သတ်မှတ်ခြင်း

                utterance.onend = function() {
                    genBtn.innerText = "🚀 အသံဖိုင် ဖန်တီးမည် (Generate)";
                    genBtn.disabled = false;
                };

                utterance.onerror = function(e) {
                    console.error(e);
                    alert("အသံထွက်ရန် စနစ်ပိုင်းဆိုင်ရာ အဆင်မပြေဖြစ်နေပါသည်။");
                    genBtn.innerText = "🚀 အသံဖိုင် ဖန်တီးမည် (Generate)";
                    genBtn.disabled = false;
                };

                // UI ပြသခြင်း
                if(resultSection) resultSection.classList.remove("hidden");
                
                // စတင်အသံထွက်စေခြင်း
                window.speechSynthesis.speak(utterance);

            } else {
                alert("သင့် Browser သည် ဤအသံထွက်စနစ်ကို အထောက်အပံ့မပေးပါ။ Chrome ကို သုံးပေးပါ။");
            }
        }
    </script>
</body>
</html>
